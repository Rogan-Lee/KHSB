name: Mobile CI

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches: [tmp-main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - run: npm ci
      - run: npx --yes expo-doctor@1.19.10
      - run: npm run typecheck
      - run: npm run lint
      - run: npx expo export --platform ios --output-dir /tmp/mobile-ios-dist
