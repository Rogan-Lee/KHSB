name: Mobile Push Receipts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Expo push receipts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-all-errors \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://khsb.vercel.app/api/cron/mobile-push-receipts
